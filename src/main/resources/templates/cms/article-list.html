<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-file-text me-2"></i>文章管理</h6>
        <button class="btn btn-cms-primary btn-sm" id="btnAdd">
            <i class="bi bi-plus-lg me-1"></i>新增文章
        </button>
    </div>
    <div class="card-body">
        <!-- Search -->
        <div class="cms-search">
            <select class="form-select form-select-sm" id="searchChannelId" style="max-width:160px;">
                <option value="">全部频道</option>
            </select>
            <input type="text" class="form-control form-control-sm" id="searchTitle" placeholder="文章标题">
            <button class="btn btn-cms-primary btn-sm" id="btnSearch"><i class="bi bi-search me-1"></i>搜索</button>
        </div>

        <!-- Table -->
        <div class="table-responsive">
            <table class="cms-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>标题</th>
                        <th>频道</th>
                        <th>创建者</th>
                        <th>置顶</th>
                        <th>状态</th>
                        <th>修改时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody"></tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div id="pagination"></div>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    var table = new CmsTable({
        apiList: '${request.contextPath}/article/list',
        apiDelete: '${request.contextPath}/article/delete',
        tableBody: '#dataTableBody',
        paginationEl: '#pagination',
        limit: 20,
        columns: [
            { field: 'articleId' },
            { field: 'title' },
            { field: 'channelName' },
            { field: 'createUserName' },
            { field: 'isTop', render: function(val) { return val == 1 ? '<span class="badge bg-warning badge-status">置顶</span>' : '-'; } },
            { field: 'status', render: function(val) { return val == 1 ? '<span class="badge bg-success badge-status">已发布</span>' : '<span class="badge bg-secondary badge-status">未发布</span>'; } },
            { field: 'updateTime' },
            { field: 'articleId', render: function(val, row) {
                var html = '';
                if (row.status == 0) {
                    html += '<button class="btn btn-success btn-sm me-1 btn-publish" data-id="'+val+'" data-status="1"><i class="bi bi-check-lg"></i>发布</button>';
                    html += '<button class="btn btn-outline-danger btn-sm me-1 btn-delete" data-id="'+val+'"><i class="bi bi-trash"></i>删除</button>';
                }
                if (row.status == 1) {
                    html += '<button class="btn btn-outline-warning btn-sm me-1 btn-publish" data-id="'+val+'" data-status="0"><i class="bi bi-pause"></i>停止</button>';
                }
                html += '<button class="btn btn-outline-primary btn-sm btn-edit" data-id="'+val+'"><i class="bi bi-pencil"></i>编辑</button>';
                return html;
            }}
        ]
    });

    table.load();

    // 搜索
    $('#btnSearch').on('click', function() {
        var params = {};
        var channelId = $('#searchChannelId').val();
        var title = $('#searchTitle').val().trim();
        if (channelId) params.channelId = channelId;
        if (title) params.title = title;
        table.search(params);
    });

    // 新增
    $('#btnAdd').on('click', function() {
        window.location.href = '${request.contextPath}/article/edit?id=0';
    });

    // 编辑
    $(document).on('click', '.btn-edit', function() {
        var id = $(this).data('id');
        window.location.href = '${request.contextPath}/article/edit?id=' + id;
    });

    // 删除
    $(document).on('click', '.btn-delete', function() {
        var id = $(this).data('id');
        table.delete(id, '文章');
    });

    // 发布/停止
    $(document).on('click', '.btn-publish', function() {
        var id = $(this).data('id');
        var status = $(this).data('status');
        var msg = status == '1' ? '确定要发布吗？' : '确定要停止吗？';
        if (confirm(msg)) {
            $.post('${request.contextPath}/article/publish', {id: id, status: status}, function(res) {
                CmsUtil.showToast(res.msg || '操作成功', res.code === 200 ? 'success' : 'danger');
                table.load();
            });
        }
    });

    // 加载频道列表
    $.post('${request.contextPath}/channel/list', {searchParams: '{"parentChannelId":"0"}', page: 1, limit: 99}, function(res) {
        if (res.code === 200 && res.data) {
            var html = '<option value="">全部频道</option>';
            res.data.forEach(function(ch) {
                html += '<option value="' + ch.channelId + '">' + ch.channelName + '</option>';
            });
            $('#searchChannelId').html(html);
        }
    });
});
</script>
</body>
</html>
