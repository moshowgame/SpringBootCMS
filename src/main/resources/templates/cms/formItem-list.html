<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-list-check me-2"></i>表单字段管理</h6>
        <button class="btn btn-cms-primary btn-sm" id="btnAdd">
            <i class="bi bi-plus-lg me-1"></i>新增字段
        </button>
    </div>
    <div class="card-body">
        <input type="hidden" id="formId" value="${(formId)!!}">
        <div class="table-responsive">
            <table class="cms-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>字段名称</th>
                        <th>字段类型</th>
                        <th>必填</th>
                        <th>排序</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody"></tbody>
            </table>
        </div>
        <div id="pagination"></div>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    var formId = $('#formId').val();
    var table = new CmsTable({
        apiList: '${request.contextPath}/formItem/list',
        apiDelete: '${request.contextPath}/formItem/delete',
        tableBody: '#dataTableBody',
        paginationEl: '#pagination',
        columns: [
            { field: 'itemId' },
            { field: 'itemName' },
            { field: 'itemType' },
            { field: 'required', render: function(val) { return val == 1 ? '<span class="badge bg-danger badge-status">必填</span>' : '-'; } },
            { field: 'sort' },
            { field: 'itemId', render: function(val) {
                return '<button class="btn btn-outline-primary btn-sm me-1 btn-edit" data-id="'+val+'"><i class="bi bi-pencil"></i>编辑</button>' +
                       '<button class="btn btn-outline-danger btn-sm btn-delete" data-id="'+val+'"><i class="bi bi-trash"></i>删除</button>';
            }}
        ]
    });

    // 加载时带上formId
    table.searchParams = { searchParams: JSON.stringify({formId: formId}) };
    table.load();

    $('#btnAdd').on('click', function() {
        window.location.href = '${request.contextPath}/formItem/edit?id=0&formId=' + formId;
    });

    $(document).on('click', '.btn-edit', function() {
        window.location.href = '${request.contextPath}/formItem/edit?id=' + $(this).data('id') + '&formId=' + formId;
    });

    $(document).on('click', '.btn-delete', function() {
        table.delete($(this).data('id'), '字段');
    });
});
</script>
</body>
</html>
