<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-people me-2"></i>用户管理</h6>
        <button class="btn btn-cms-primary btn-sm" id="btnAdd">
            <i class="bi bi-plus-lg me-1"></i>新增用户
        </button>
    </div>
    <div class="card-body">
        <div class="cms-search">
            <input type="text" class="form-control form-control-sm" id="searchUserName" placeholder="用户名">
            <button class="btn btn-cms-primary btn-sm" id="btnSearch"><i class="bi bi-search me-1"></i>搜索</button>
        </div>

        <div class="table-responsive">
            <table class="cms-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>昵称</th>
                        <th>角色</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody"></tbody>
            </table>
        </div>
        <div id="pagination"></div>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    var table = new CmsTable({
        apiList: '${request.contextPath}/user/list',
        apiDelete: '${request.contextPath}/user/delete',
        tableBody: '#dataTableBody',
        paginationEl: '#pagination',
        columns: [
            { field: 'userId' },
            { field: 'userName' },
            { field: 'showName', render: function(val) { return val || '-'; } },
            { field: 'roleId', render: function(val) { return val == 9 ? '管理员' : '普通用户'; } },
            { field: 'status', render: function(val) { return val == 1 ? '<span class="badge bg-success badge-status">启用</span>' : '<span class="badge bg-secondary badge-status">停用</span>'; } },
            { field: 'userId', render: function(val) {
                return '<button class="btn btn-outline-primary btn-sm me-1 btn-edit" data-id="'+val+'"><i class="bi bi-pencil"></i>编辑</button>' +
                       '<button class="btn btn-outline-danger btn-sm btn-delete" data-id="'+val+'"><i class="bi bi-trash"></i>删除</button>';
            }}
        ]
    });

    table.load();

    $('#btnSearch').on('click', function() {
        var name = $('#searchUserName').val().trim();
        var params = {};
        if (name) params.userName = name;
        table.search(params);
    });

    $('#btnAdd').on('click', function() {
        window.location.href = '${request.contextPath}/user/edit?id=0';
    });

    $(document).on('click', '.btn-edit', function() {
        window.location.href = '${request.contextPath}/user/edit?id=' + $(this).data('id');
    });

    $(document).on('click', '.btn-delete', function() {
        table.delete($(this).data('id'), '用户');
    });
});
</script>
</body>
</html>
