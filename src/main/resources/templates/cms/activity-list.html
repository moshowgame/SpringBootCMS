<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-calendar-event me-2"></i>活动管理</h6>
        <button class="btn btn-cms-primary btn-sm" id="btnAdd">
            <i class="bi bi-plus-lg me-1"></i>新增活动
        </button>
    </div>
    <div class="card-body">
        <div class="cms-search">
            <input type="text" class="form-control form-control-sm" id="searchTitle" placeholder="活动名称">
            <button class="btn btn-cms-primary btn-sm" id="btnSearch"><i class="bi bi-search me-1"></i>搜索</button>
        </div>

        <div class="table-responsive">
            <table class="cms-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>活动名称</th>
                        <th>开始时间</th>
                        <th>结束时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody"></tbody>
            </table>
        </div>
        <div id="pagination"></div>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    var table = new CmsTable({
        apiList: '${request.contextPath}/activity/list',
        apiDelete: '${request.contextPath}/activity/delete',
        tableBody: '#dataTableBody',
        paginationEl: '#pagination',
        columns: [
            { field: 'activityId' },
            { field: 'title' },
            { field: 'startTime' },
            { field: 'endTime' },
            { field: 'status', render: function(val) { return val == '1' ? '<span class="badge bg-success badge-status">进行中</span>' : '<span class="badge bg-secondary badge-status">已结束</span>'; } },
            { field: 'activityId', render: function(val, row) {
                return '<button class="btn btn-outline-primary btn-sm me-1 btn-edit" data-id="'+val+'"><i class="bi bi-pencil"></i>编辑</button>' +
                       '<button class="btn btn-outline-danger btn-sm me-1 btn-delete" data-id="'+val+'"><i class="bi bi-trash"></i>删除</button>' +
                       '<a href="${request.contextPath}/activitySign/list?activityId='+val+'" class="btn btn-outline-info btn-sm me-1"><i class="bi bi-people"></i>签到</a>';
            }}
        ]
    });

    table.load();

    $('#btnSearch').on('click', function() {
        var title = $('#searchTitle').val().trim();
        var params = {};
        if (title) params.title = title;
        table.search(params);
    });

    $('#btnAdd').on('click', function() {
        window.location.href = '${request.contextPath}/activity/edit?id=0';
    });

    $(document).on('click', '.btn-edit', function() {
        window.location.href = '${request.contextPath}/activity/edit?id=' + $(this).data('id');
    });

    $(document).on('click', '.btn-delete', function() {
        table.delete($(this).data('id'), '活动');
    });
});
</script>
</body>
</html>
