<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-ui-checks-grid me-2"></i><#if form??>编辑表单<#else>新增表单</#if></h6>
    </div>
    <div class="card-body">
        <form id="formForm" class="cms-form">
            <input type="hidden" name="formId" value="${(form.formId)!!}">

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">表单名称 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="title" value="${(form.title)!!}" placeholder="请输入表单名称" required>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">描述</label>
                <div class="col-sm-10">
                    <textarea class="form-control" name="description" rows="3" placeholder="请输入表单描述">${(form.description)!!}</textarea>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">状态</label>
                <div class="col-sm-10">
                    <select class="form-select" name="status">
                        <option value="1" <#if (form.status)?? && form.status == 1>selected</#if>>启用</option>
                        <option value="0" <#if (form.status)?? && form.status == 0>selected</#if>>停用</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-cms-primary"><i class="bi bi-check-lg me-1"></i>确认保存</button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary ms-2">返回</a>
                </div>
            </div>
        </form>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    $('#formForm').on('submit', function(e) {
        e.preventDefault();
        var formData = {};
        $(this).serializeArray().forEach(function(item) {
            formData[item.name] = item.value;
        });
        $.ajax({
            type: 'POST',
            url: '${request.contextPath}/form/save',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            dataType: 'json',
            success: function(res) {
                if (res.code === 200) {
                    CmsUtil.showToast(res.msg || '保存成功', 'success');
                    setTimeout(function() { history.back(); }, 800);
                } else {
                    CmsUtil.showToast(res.msg || '保存失败', 'danger');
                }
            }
        });
    });
});
</script>
</body>
</html>
