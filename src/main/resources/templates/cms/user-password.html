<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-key me-2"></i>修改密码</h6>
    </div>
    <div class="card-body">
        <form id="passwordForm" class="cms-form">
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">原密码 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="password" class="form-control" name="oldPassword" placeholder="请输入原密码" required>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">新密码 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="password" class="form-control" name="newPassword" id="newPassword" placeholder="请输入新密码" required>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">确认密码 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="password" class="form-control" name="confirmPassword" id="confirmPassword" placeholder="请再次输入新密码" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-cms-primary"><i class="bi bi-check-lg me-1"></i>确认修改</button>
                </div>
            </div>
        </form>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    $('#passwordForm').on('submit', function(e) {
        e.preventDefault();
        var newPwd = $('#newPassword').val();
        var confirmPwd = $('#confirmPassword').val();
        if (newPwd !== confirmPwd) {
            CmsUtil.showToast('两次输入的密码不一致', 'danger');
            return;
        }
        var formData = {};
        $(this).serializeArray().forEach(function(item) {
            formData[item.name] = item.value;
        });
        $.ajax({
            type: 'POST',
            url: '${request.contextPath}/user/updatePassword',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            dataType: 'json',
            success: function(res) {
                CmsUtil.showToast(res.msg || (res.code === 200 ? '修改成功' : '修改失败'), res.code === 200 ? 'success' : 'danger');
                if (res.code === 200) {
                    $('#passwordForm')[0].reset();
                }
            }
        });
    });
});
</script>
</body>
</html>
