<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-file-earmark-excel me-2"></i>Excel导出</h6>
    </div>
    <div class="card-body">
        <form id="exportForm" class="cms-form">
            <input type="hidden" id="formId" name="formId" value="${(formId)!!}">
            <div class="row mb-3">
                <label class="col-sm-3 col-form-label">搜索条件</label>
                <div class="col-sm-9">
                    <input type="text" class="form-control" name="searchParams" placeholder="可选搜索条件">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-sm-9 offset-sm-3">
                    <button type="submit" class="btn btn-cms-primary"><i class="bi bi-download me-1"></i>导出Excel</button>
                </div>
            </div>
        </form>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    $('#exportForm').on('submit', function(e) {
        e.preventDefault();
        var formId = $('#formId').val();
        var searchParams = $('input[name="searchParams"]').val();
        var url = '${request.contextPath}/formSubmitValue/excel/export?formId=' + formId;
        if (searchParams) url += '&searchParams=' + encodeURIComponent(searchParams);
        window.location.href = url;
    });
});
</script>
</body>
</html>
