<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-people me-2"></i><#if user??>编辑用户<#else>新增用户</#if></h6>
    </div>
    <div class="card-body">
        <form id="userForm" class="cms-form">
            <input type="hidden" name="userId" value="${(user.userId)!!}">

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">用户名 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="userName" value="${(user.userName)!!}" placeholder="请输入用户名" required>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">昵称</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="nickName" value="${(user.nickName)!!}" placeholder="请输入昵称">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">密码 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="password" class="form-control" name="password" placeholder="<#if user??>留空则不修改<#else>请输入密码</#if>" <#if !user??>required</#if>>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">邮箱</label>
                <div class="col-sm-10">
                    <input type="email" class="form-control" name="email" value="${(user.email)!!}" placeholder="请输入邮箱">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">手机号</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="phone" value="${(user.phone)!!}" placeholder="请输入手机号">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">状态</label>
                <div class="col-sm-10">
                    <select class="form-select" name="status">
                        <option value="1" <#if (user.status)?? && user.status == 1>selected</#if>>启用</option>
                        <option value="0" <#if (user.status)?? && user.status == 0>selected</#if>>停用</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-cms-primary"><i class="bi bi-check-lg me-1"></i>确认保存</button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary ms-2">返回</a>
                </div>
            </div>
        </form>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    $('#userForm').on('submit', function(e) {
        e.preventDefault();
        var formData = {};
        $(this).serializeArray().forEach(function(item) {
            if (item.value) formData[item.name] = item.value;
        });
        $.ajax({
            type: 'POST',
            url: '${request.contextPath}/user/save',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            dataType: 'json',
            success: function(res) {
                if (res.code === 200) {
                    CmsUtil.showToast(res.msg || '保存成功', 'success');
                    setTimeout(function() { history.back(); }, 800);
                } else {
                    CmsUtil.showToast(res.msg || '保存失败', 'danger');
                }
            }
        });
    });
});
</script>
</body>
</html>
