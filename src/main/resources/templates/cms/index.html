<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.indexImport />
<body>

<!-- Sidebar -->
<nav class="cms-sidebar" id="sidebar">
    <div class="sidebar-brand">
        <i class="bi bi-gear-wide-connected"></i>
        <span>SpringBootCMS</span>
    </div>
    <div class="nav-section">导航菜单</div>
    <!-- 菜单通过 AJAX 动态加载 -->
</nav>

<!-- Main Content -->
<div class="cms-main">
    <!-- Header -->
    <header class="cms-header">
        <div class="header-left">
            <button class="toggle-sidebar" title="折叠菜单">
                <i class="bi bi-list"></i>
            </button>
            <span class="text-muted" id="currentTabTitle">首页</span>
        </div>
        <div class="header-right">
            <button class="btn btn-sm btn-outline-secondary" id="btnRefresh" title="刷新">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
            <div class="dropdown">
                <button class="btn btn-sm btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>${(loginUser.userName)!!}
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item cms-nav-link" href="javascript:;" data-url="${request.contextPath}/user/info" data-title="基本资料">
                        <i class="bi bi-gear me-2"></i>基本资料
                    </a></li>
                    <li><a class="dropdown-item cms-nav-link" href="javascript:;" data-url="${request.contextPath}/user/password" data-title="修改密码">
                        <i class="bi bi-key me-2"></i>修改密码
                    </a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="${request.contextPath}/admin/logout">
                        <i class="bi bi-box-arrow-right me-2"></i>退出登录
                    </a></li>
                </ul>
            </div>
        </div>
    </header>

    <!-- Tab Bar -->
    <div class="bg-white border-bottom px-3 pt-2" id="tabBar" style="display:none;">
        <ul class="nav nav-tabs border-0" id="cmsTabs" role="tablist">
        </ul>
    </div>

    <!-- Content iframe -->
    <div class="cms-content">
        <iframe id="mainFrame" src="${request.contextPath}/admin/welcome" width="100%" frameborder="0"
                style="min-height: calc(100vh - 120px); border: none; border-radius: 8px; background: #fff;"></iframe>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    var $sidebar = $('#sidebar');
    var $mainFrame = $('#mainFrame');
    var $tabBar = $('#tabBar');
    var $tabs = $('#cmsTabs');
    var $currentTitle = $('#currentTabTitle');
    var tabs = [];
    // tabId -> { url, title }：关闭/切换 tab 时需要据此更新 iframe
    var tabMeta = {};
    var activeTabId = 'home';

    // 侧边栏折叠
    $('.toggle-sidebar').on('click', function() {
        $sidebar.toggleClass('collapsed');
    });

    // 导航点击
    $(document).on('click', '.nav-link, .cms-nav-link', function(e) {
        e.preventDefault();
        var url = $(this).data('url');
        var title = $(this).data('title');
        if (!url) return;
        openTab(title, url);
    });

    // 刷新
    $('#btnRefresh').on('click', function() {
        $mainFrame.attr('src', $mainFrame.attr('src'));
    });

    function openTab(title, url) {
        var tabId = 'tab_' + url.replace(/[^a-zA-Z0-9]/g, '_');

        // 已存在则激活
        if (tabs.indexOf(tabId) >= 0) {
            activateTab(tabId);
            return;
        }

        tabs.push(tabId);
        tabMeta[tabId] = { url: url, title: title };
        $tabBar.show();

        // 添加tab
        var tabHtml = '<li class="nav-item" data-tab="' + tabId + '">' +
            '<a class="nav-link" href="#">' + title +
            ' <button type="button" class="btn-close btn-close-white ms-2" style="font-size:0.6em;" data-close="' + tabId + '"></button></a></li>';
        $tabs.append(tabHtml);

        activateTab(tabId);
    }

    // 激活某个 tab：同时更新高亮样式、iframe 地址与顶部标题
    function activateTab(tabId) {
        activeTabId = tabId;
        $tabs.find('.nav-link').removeClass('active');
        $tabs.find('[data-tab="' + tabId + '"] .nav-link').addClass('active');
        var meta = tabMeta[tabId];
        if (meta) {
            if ($mainFrame.attr('src') !== meta.url) {
                $mainFrame.attr('src', meta.url);
            }
            $currentTitle.text(meta.title);
        }
    }

    // 关闭tab
    $(document).on('click', '[data-close]', function(e) {
        e.preventDefault();
        e.stopImmediatePropagation();
        var tabId = $(this).data('close');
        var idx = tabs.indexOf(tabId);
        if (idx < 0) return;

        var wasActive = (activeTabId === tabId);
        tabs.splice(idx, 1);
        delete tabMeta[tabId];
        $('[data-tab="' + tabId + '"]').remove();

        if (tabs.length === 0) {
            $tabBar.hide();
            $mainFrame.attr('src', '${request.contextPath}/admin/welcome');
            $currentTitle.text('首页');
            activeTabId = 'home';
        } else if (wasActive) {
            // 关闭的是当前激活的 tab，切到相邻 tab 并刷新 iframe
            var newActive = tabs[Math.max(0, idx - 1)];
            activateTab(newActive);
        }
    });

    // Tab点击
    $(document).on('click', '#cmsTabs .nav-link', function(e) {
        e.preventDefault();
        var tabId = $(this).closest('[data-tab]').data('tab');
        activateTab(tabId);
    });

    // 加载菜单
    $.getJSON('${request.contextPath}/menu/init', function(data) {
        if (data && data.menuInfo) {
            var html = '';
            data.menuInfo.forEach(function(group) {
                if (group.child && group.child.length > 0) {
                    group.child.forEach(function(menu) {
                        if (menu.child && menu.child.length > 0) {
                            html += '<div class="nav-section">' + menu.title + '</div>';
                            menu.child.forEach(function(child) {
                                var url = child.href || '';
                                // 去掉可能的 contextPath 前缀，避免重复
                                if (url.indexOf('${request.contextPath}') === 0) {
                                    url = url.substring('${request.contextPath}'.length);
                                }
                                html += '<a href="javascript:;" class="nav-link" data-url="${request.contextPath}' + url + '" data-title="' + child.title + '">' +
                                    '<i class="bi ' + (child.icon || 'bi-folder') + '"></i>' +
                                    '<span>' + child.title + '</span></a>';
                            });
                        } else {
                            var url = menu.href || '';
                            if (url.indexOf('${request.contextPath}') === 0) {
                                url = url.substring('${request.contextPath}'.length);
                            }
                            html += '<a href="javascript:;" class="nav-link" data-url="${request.contextPath}' + url + '" data-title="' + menu.title + '">' +
                                '<i class="bi ' + (menu.icon || 'bi-folder') + '"></i>' +
                                '<span>' + menu.title + '</span></a>';
                        }
                    });
                }
            });
            $sidebar.find('.nav-section').first().after(html);
        }
    });

    // iframe自适应高度
    function resizeFrame() {
        var h = window.innerHeight - 120;
        $mainFrame.css('min-height', h + 'px');
    }
    $(window).on('resize', resizeFrame);
    resizeFrame();
});
</script>
</body>
</html>
