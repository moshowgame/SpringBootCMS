<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-gear me-2"></i><#if siteConfig??>编辑配置<#else>新增配置</#if></h6>
    </div>
    <div class="card-body">
        <form id="configForm" class="cms-form">
            <input type="hidden" name="configId" value="${(siteConfig.configId)!!?html}">

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">配置键 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="configKey" value="${(siteConfig.configKey)!!?html}" placeholder="请输入配置键，如 site_name" required>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">配置值</label>
                <div class="col-sm-10">
                    <textarea class="form-control" name="configValue" rows="5" placeholder="请输入配置值">${(siteConfig.configValue)!!?html}</textarea>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">分组</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="configGroup" value="${(siteConfig.configGroup)!!?html}" placeholder="请输入分组，如 base、index">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">描述</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="description" value="${(siteConfig.description)!!?html}" placeholder="请输入配置描述">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">排序</label>
                <div class="col-sm-10">
                    <input type="number" class="form-control" name="sort" value="${(siteConfig.sort)!'0'?html}" placeholder="排序值">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-cms-primary"><i class="bi bi-check-lg me-1"></i>确认保存</button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary ms-2">返回</a>
                </div>
            </div>
        </form>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    $('#configForm').on('submit', function(e) {
        e.preventDefault();
        var formData = {};
        $(this).serializeArray().forEach(function(item) {
            formData[item.name] = item.value;
        });
        $.ajax({
            type: 'POST',
            url: '${request.contextPath}/siteConfig/save',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            dataType: 'json',
            success: function(res) {
                if (res.code === 200) {
                    CmsUtil.showToast(res.msg || '保存成功', 'success');
                    setTimeout(function() { history.back(); }, 800);
                } else {
                    CmsUtil.showToast(res.msg || '保存失败', 'danger');
                }
            }
        });
    });
});
</script>
</body>
</html>
