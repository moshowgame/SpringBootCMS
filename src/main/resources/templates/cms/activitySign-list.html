<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-person-check me-2"></i>活动报名管理</h6>
    </div>
    <div class="card-body">
        <input type="hidden" id="activityId" value="${(activityId)!!}">
        <div class="cms-search">
            <input type="text" class="form-control form-control-sm" id="searchName" placeholder="报名人姓名">
            <button class="btn btn-cms-primary btn-sm" id="btnSearch"><i class="bi bi-search me-1"></i>搜索</button>
        </div>
        <div id="searchWarning"></div>
        <div class="table-responsive">
            <table class="cms-table">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>ID</th>
                        <th>报名人</th>
                        <th>手机号</th>
                        <th>报名时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody"></tbody>
            </table>
        </div>
        <div id="pagination"></div>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    var activityId = $('#activityId').val();
    var table = new CmsTable({
        apiList: '${request.contextPath}/activitySign/list',
        apiDelete: '${request.contextPath}/activitySign/delete',
        tableBody: '#dataTableBody',
        paginationEl: '#pagination',
        columns: [
            { field: 'signId' },
            { field: 'showName', render: function(val) { return val || '-'; } },
            { field: 'phone', render: function(val) { return val || '-'; } },
            { field: 'signTime' },
            { field: 'signType', render: function(val) {
                if (val == 1) return '<span class="badge bg-success badge-status">已签到</span>';
                if (val == 2) return '<span class="badge bg-danger badge-status">请假</span>';
                return '<span class="badge bg-warning badge-status">待确认</span>';
            }},
            { field: 'signId', render: function(val) {
                return '<button class="btn btn-outline-danger btn-sm btn-delete" data-id="'+val+'"><i class="bi bi-trash"></i>删除</button>';
            }}
        ]
    });

    table.searchParams = { searchParams: JSON.stringify({activityId: activityId}) };
    table.load();

    $('#btnSearch').on('click', function() {
        var name = $('#searchName').val().trim();
        // 客户端预检测
        var localCheck = adminAttackCheck(name);
        if (localCheck.detected) {
            showAdminWarning(localCheck);
            return;
        }
        var params = {activityId: activityId};
        if (name) params.searchParam = name;
        table.search(params);
    });

    /**
     * 管理员端攻击检测 + 警告显示
     */
    function adminAttackCheck(value) {
        if (!value) return { detected: false };
        var rules = [
            { type: 'SQL_INJECTION', typeDescription: 'SQL 注入', pattern: /(\bunion\b[\s\/*]+select\b|\bor\s+1\s*=\s*1|--|\/\*)/i, keyword: 'SQL 关键字' },
            { type: 'XSS', typeDescription: 'XSS 跨站脚本', pattern: /(<\s*script\b|<\s*iframe\b|javascript\s*:|on(error|load|click)\s*=)/i, keyword: 'XSS 标签/事件' },
            { type: 'SVG_INJECTION', typeDescription: 'SVG 注入', pattern: /(<\s*svg\b|<\s*use\b|xlink\s*:\s*href)/i, keyword: 'SVG 标签' },
            { type: 'PATH_TRAVERSAL', typeDescription: '路径遍历', pattern: /(\.\.\/|\.\.\\)/, keyword: '../ 路径遍历' }
        ];
        for (var i = 0; i < rules.length; i++) {
            if (rules[i].pattern.test(value)) {
                return { detected: true, typeDescription: rules[i].typeDescription, keyword: rules[i].keyword };
            }
        }
        return { detected: false };
    }

    function showAdminWarning(check) {
        var html = '<div class="alert alert-danger alert-dismissible fade show mt-2" role="alert">' +
            '<i class="bi bi-shield-exclamation me-2"></i>' +
            '<strong>输入已被拦截：</strong>检测到 <code>' + check.typeDescription + '</code> 攻击特征 ' +
            '（关键字：<code>' + check.keyword + '</code>）' +
            '<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>' +
            '</div>';
        $('#searchWarning').html(html);
    }
});
</script>
</body>
</html>
