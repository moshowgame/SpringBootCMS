<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-person-check me-2"></i>活动报名管理</h6>
    </div>
    <div class="card-body">
        <input type="hidden" id="activityId" value="${(activityId)!!}">
        <div class="cms-search">
            <input type="text" class="form-control form-control-sm" id="searchName" placeholder="报名人姓名">
            <button class="btn btn-cms-primary btn-sm" id="btnSearch"><i class="bi bi-search me-1"></i>搜索</button>
        </div>
        <div class="table-responsive">
            <table class="cms-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>报名人</th>
                        <th>手机号</th>
                        <th>报名时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody"></tbody>
            </table>
        </div>
        <div id="pagination"></div>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    var activityId = $('#activityId').val();
    var table = new CmsTable({
        apiList: '${request.contextPath}/activitySign/list',
        apiDelete: '${request.contextPath}/activitySign/delete',
        tableBody: '#dataTableBody',
        paginationEl: '#pagination',
        columns: [
            { field: 'signId' },
            { field: 'signUserName', render: function(val) { return val || '-'; } },
            { field: 'phone', render: function(val) { return val || '-'; } },
            { field: 'createTime' },
            { field: 'status', render: function(val) {
                if (val == '1') return '<span class="badge bg-success badge-status">已确认</span>';
                if (val == '2') return '<span class="badge bg-danger badge-status">已取消</span>';
                return '<span class="badge bg-warning badge-status">待确认</span>';
            }},
            { field: 'signId', render: function(val) {
                return '<button class="btn btn-outline-danger btn-sm btn-delete" data-id="'+val+'"><i class="bi bi-trash"></i>删除</button>';
            }}
        ]
    });

    table.searchParams = { searchParams: JSON.stringify({activityId: activityId}) };
    table.load();

    $('#btnSearch').on('click', function() {
        var name = $('#searchName').val().trim();
        var params = {activityId: activityId};
        if (name) params.signUserName = name;
        table.search(params);
    });
});
</script>
</body>
</html>
