<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-eye me-2"></i>提交详情</h6>
    </div>
    <div class="card-body">
        <#if formSubmitValueList??>
            <#list formSubmitValueList as item>
            <div class="row mb-3">
                <label class="col-sm-3 col-form-label text-muted">${item.itemName!''}</label>
                <div class="col-sm-9">
                    <#if item.itemType == 'file'>
                        <a href="${request.contextPath}/file/files/${item.itemValue!''}" target="_blank">${item.itemValue!'-'}</a>
                    <#else>
                        <p class="form-control-plaintext">${item.itemValue!'-'}</p>
                    </#if>
                </div>
            </div>
            </#list>
        <#else>
            <p class="text-muted">暂无数据</p>
        </#if>
        <div class="mt-3">
            <a href="javascript:history.back()" class="btn btn-outline-secondary">返回</a>
        </div>
    </div>
</div>

<@netCommon.commonScript />
</body>
</html>
