<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-menu-button-wide me-2"></i><#if menu??>编辑菜单<#else>新增菜单</#if></h6>
    </div>
    <div class="card-body">
        <form id="menuForm" class="cms-form">
            <input type="hidden" name="menuId" value="${(menu.menuId)!!?html}">

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">菜单名称 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="title" value="${(menu.title)!!?html}" placeholder="请输入菜单名称" required>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">菜单URL</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="href" value="${(menu.href)!!?html}" placeholder="请输入菜单URL">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">图标</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="icon" value="${(menu.icon)!!?html}" placeholder="Bootstrap Icons类名，如 bi-house">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">父菜单</label>
                <div class="col-sm-10">
                    <select class="form-select" name="parentMenuId" id="parentMenuId">
                        <option value="0">顶级菜单</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">排序</label>
                <div class="col-sm-10">
                    <input type="number" class="form-control" name="sort" value="${(menu.sort)!'0'?html}" placeholder="排序值">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">角色</label>
                <div class="col-sm-10" id="roleCheckboxes">
                    <#if roleList??>
                        <#list roleList as role>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" name="roleIds" id="role_${role.roleId?html}" value="${role.roleId?html}"
                                <#if menu?? && menu.roleId??><#list (menu.roleId?split(',')) as rid><#if rid == role.roleId?string>checked</#if></#list></#if>>
                            <label class="form-check-label" for="role_${role.roleId?html}">${role.roleName!''?html}</label>
                        </div>
                        </#list>
                    </#if>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-cms-primary"><i class="bi bi-check-lg me-1"></i>确认保存</button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary ms-2">返回</a>
                </div>
            </div>
        </form>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    // 加载父菜单
    $.post('${request.contextPath}/menu/list', {page: 1, limit: 99}, function(res) {
        if (res.code === 200 && res.data) {
            var html = '<option value="0">顶级菜单</option>';
            res.data.forEach(function(m) {
                var selected = m.menuId == '${(menu.parentMenuId)!"0"}' ? ' selected' : '';
                // XSS 防护：title 来自数据库
                html += '<option value="' + CmsUtil.escapeHtml(m.menuId) + '"' + selected + '>' + CmsUtil.escapeHtml(m.title) + '</option>';
            });
            $('#parentMenuId').html(html);
        }
    });

    $('#menuForm').on('submit', function(e) {
        e.preventDefault();
        var formData = {};
        $(this).serializeArray().forEach(function(item) {
            if (item.name === 'roleIds') {
                if (!formData.roleId) formData.roleId = '';
                formData.roleId += (formData.roleId ? ',' : '') + item.value;
            } else {
                formData[item.name] = item.value;
            }
        });
        $.ajax({
            type: 'POST',
            url: '${request.contextPath}/menu/save',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            dataType: 'json',
            success: function(res) {
                if (res.code === 200) {
                    CmsUtil.showToast(res.msg || '保存成功', 'success');
                    setTimeout(function() { history.back(); }, 800);
                } else {
                    CmsUtil.showToast(res.msg || '保存失败', 'danger');
                }
            }
        });
    });
});
</script>
</body>
</html>
