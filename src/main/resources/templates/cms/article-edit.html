<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-file-text me-2"></i><#if article??>编辑文章<#else>新增文章</#if></h6>
    </div>
    <div class="card-body">
        <form id="articleForm" class="cms-form">
            <input type="hidden" name="articleId" value="${(article.articleId)!!}">
            <#if !article??>
            <input type="hidden" name="createUserId" value="${(loginUser.userId)!!}">
            <input type="hidden" name="createUserName" value="${(loginUser.showName)!!}">
            </#if>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">文章标题 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="title" value="${(article.title)!!}" placeholder="请输入文章标题" required>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">摘要 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <textarea class="form-control" name="description" rows="2" placeholder="请输入摘要，250字以内" required>${(article.description)!!}</textarea>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">内容 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <textarea id="editorBody" name="content" class="d-none"><#if article?? && article.content??>${article.content?replace('@@@',request.contextPath+'/file/files/')}</#if></textarea>
                    <div id="editorFallback" class="form-text text-muted d-none mt-1">
                        <i class="bi bi-info-circle"></i> 富文本编辑器加载失败，请检查网络连接。
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">频道分类 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <select class="form-select" name="channelId" id="channelId" required>
                        <option value="">请选择频道</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">关键字</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="keyword" value="${(article.keyword)!!}" placeholder="关键字，逗号分隔">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">是否置顶</label>
                <div class="col-sm-10">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="isTop" id="isTop1" value="1" <#if article?? && article.isTop?? && article.isTop == "1">checked</#if>>
                        <label class="form-check-label" for="isTop1">是</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="isTop" id="isTop0" value="0" <#if article?? && article.isTop?? && article.isTop == "0">checked<#elseif !article??>checked</#if>>
                        <label class="form-check-label" for="isTop0">否</label>
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-cms-primary"><i class="bi bi-check-lg me-1"></i>确认保存</button>
                    <button type="button" class="btn btn-outline-secondary ms-2" id="btnUploadNetImg"><i class="bi bi-cloud-download me-1"></i>网络图片转存本地</button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary ms-2">返回</a>
                </div>
            </div>
        </form>
    </div>
</div>

<@netCommon.commonScript />
<#-- TinyMCE 8 富文本编辑器（自托管） -->
<script src="${request.contextPath}/static/lib/tinymce/tinymce.min.js"></script>
<script>
$(function() {
    var ctxPath = '${request.contextPath}';

    // ==================== TinyMCE 初始化 ====================
    function initEditor() {
        if (typeof tinymce === 'undefined') {
            $('#editorFallback').removeClass('d-none');
            return;
        }

        tinymce.init({
            // 自托管社区版（GPLv2 开源许可）
            license_key: 'gpl',
            // 挂载到 textarea
            selector: '#editorBody',
            // 编辑器高度
            height: 500,
            // 中文界面
            language: 'zh_CN',
            // 插件（免费版可用）
            plugins: 'advlist autolink lists link image charmap preview anchor searchreplace visualblocks code fullscreen insertdatetime media table help wordcount',
            // 工具栏
            toolbar: 'undo redo | blocks | bold italic underline strikethrough | forecolor backcolor | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | image link media table | code fullscreen help',
            // 图片设置
            image_advtab: true,
            // ========== 粘贴图片自动上传 ==========
            automatic_uploads: true,
            paste_data_images: true,
            file_picker_types: 'image',
            // ========== 自定义图片上传处理 ==========
            images_upload_handler: function(blobInfo, progress) {
                return new Promise(function(resolve, reject) {
                    var formData = new FormData();
                    formData.append('file', blobInfo.blob(), blobInfo.filename());

                    $.ajax({
                        url: ctxPath + '/file/editorUpload',
                        type: 'POST',
                        data: formData,
                        processData: false,
                        contentType: false,
                        success: function(res) {
                            if (res && res.url) {
                                resolve(res.url);
                            } else {
                                reject((res && res.error && res.error.message) || '图片上传失败');
                            }
                        },
                        error: function(jqXHR) {
                            reject('上传失败: ' + (jqXHR.responseText || '网络错误'));
                        }
                    });
                });
            },
            // ========== 编辑器事件 ==========
            setup: function(editor) {
                // 加载已有内容
                var existing = $('#editorBody').val();
                if (existing) {
                    editor.on('init', function() {
                        editor.setContent(existing);
                    });
                }

                // 内容变化时自动处理残留的 base64 图片
                editor.on('Change', function() {
                    autoUploadBase64Images(editor);
                });
            }
        });
    }

    // ==================== 自动上传编辑器中的 base64 图片 ====================
    var base64UploadPending = false;

    function autoUploadBase64Images(editor) {
        if (base64UploadPending) return;
        base64UploadPending = true;

        setTimeout(function() {
            base64UploadPending = false;
            var content = editor.getContent();
            // 匹配 data:image/ 开头的 base64 图片
            var base64Regex = /<img[^>]+src="(data:image\/([^";]+);base64,([^"]+))"[^>]*>/g;
            var matches = [];
            var match;

            while ((match = base64Regex.exec(content)) !== null) {
                matches.push({
                    fullTag: match[0],
                    base64String: match[1],
                    ext: match[2]
                });
            }

            if (matches.length === 0) return;

            // 逐个上传 base64 图片
            (async function() {
                for (var i = 0; i < matches.length; i++) {
                    var item = matches[i];
                    try {
                        var res = await $.ajax({
                            url: ctxPath + '/file/base64upload',
                            type: 'POST',
                            data: {
                                base64String: item.base64String,
                                ext: item.ext
                            }
                        });
                        if (res.code === 200 && res.data && res.data.src) {
                            var currentContent = editor.getContent();
                            // 只替换第一个匹配（防止同一图片被多次替换）
                            editor.setContent(currentContent.replace(item.base64String, res.data.src));
                        }
                    } catch (e) {
                        console.warn('base64 图片上传失败', e);
                    }
                }
            })();
        }, 2000); // 内容变化后 2 秒再检查，避免频繁处理
    }

    // ==================== 同步编辑器内容到 textarea ====================
    function syncContent() {
        var editor = tinymce.get('editorBody');
        if (editor) {
            // TinyMCE 会自动同步到 textarea，这里显式同步确保准确性
            editor.save();
        }
    }

    // ==================== 加载频道列表 ====================
    $.post('${request.contextPath}/channel/list', {
        searchParams: '{"parentChannelId":"0"}',
        page: 1,
        limit: 99
    }, function(res) {
        if (res.code === 200 && res.data) {
            var html = '<option value="">请选择频道</option>';
            res.data.forEach(function(ch) {
                var selected = ch.channelId == '${(article.channelId)!"0"}' ? ' selected' : '';
                html += '<option value="' + ch.channelId + '"' + selected + '>' + ch.channelName + '</option>';
            });
            $('#channelId').html(html);
        }
    });

    // ==================== 初始化编辑器 ====================
    initEditor();

    // ==================== 表单提交 ====================
    $('#articleForm').on('submit', async function(e) {
        e.preventDefault();

        // 等待 TinyMCE 所有待上传图片完成
        var editor = tinymce.get('editorBody');
        if (editor) {
            try {
                await editor.uploadImages();
            } catch (e) {
                // 图片上传失败不影响保存
                console.warn('uploadImages warning:', e);
            }
        }

        // 同步编辑器内容到隐藏 textarea
        syncContent();

        var formData = {};
        $(this).serializeArray().forEach(function(item) {
            formData[item.name] = item.value;
        });

        // 替换图片路径（正文内绝对地址转存占位符 @@@）
        formData.content = (formData.content || '').split(ctxPath + '/file/files/').join('@@@');

        // 标题/摘要/内容基础校验
        if (!formData.title) { CmsUtil.showToast('请输入文章标题', 'warning'); return; }
        if (!formData.content) { CmsUtil.showToast('请输入文章内容', 'warning'); return; }

        $.ajax({
            type: 'POST',
            url: '${request.contextPath}/article/save',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            dataType: 'json',
            success: function(res) {
                if (res.code === 200) {
                    CmsUtil.showToast(res.msg || '保存成功', 'success');
                    setTimeout(function() { history.back(); }, 800);
                } else {
                    CmsUtil.showToast(res.msg || '保存失败', 'danger');
                }
            }
        });
    });

    // ==================== 网络图片转存本地 ====================
    $('#btnUploadNetImg').on('click', async function() {
        var editor = tinymce.get('editorBody');
        if (!editor) {
            CmsUtil.showToast('编辑器尚未初始化', 'warning');
            return;
        }

        var content = editor.getContent();
        var imgRegex = /<img[^>]+src="(http[^"]*?)"/g;
        var matches = [];
        var match;

        while ((match = imgRegex.exec(content)) !== null) {
            var imgUrl = match[1];
            if (imgUrl.indexOf(ctxPath) === -1) {
                matches.push(imgUrl);
            }
        }

        if (matches.length === 0) {
            CmsUtil.showToast('未发现需要转存的网络图片', 'info');
            return;
        }

        CmsUtil.showToast('正在转存 ' + matches.length + ' 张图片...', 'info');

        // 顺序处理（async/await 修复竞态问题）
        for (var i = 0; i < matches.length; i++) {
            var imgUrl = matches[i];
            try {
                var res = await $.ajax({
                    url: ctxPath + '/file/saveNetworkImg',
                    type: 'POST',
                    data: { imgUrl: imgUrl }
                });

                if (res.data && res.data.src) {
                    var currentContent = editor.getContent();
                    editor.setContent(currentContent.split(imgUrl).join(res.data.src));
                }
            } catch (e) {
                console.warn('转存失败: ' + imgUrl, e);
            }
        }

        CmsUtil.showToast('转存完成', 'success');
    });
});
</script>
</body>
</html>
