<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-file-text me-2"></i><#if article??>编辑文章<#else>新增文章</#if></h6>
    </div>
    <div class="card-body">
        <form id="articleForm" class="cms-form">
            <input type="hidden" name="articleId" value="${(article.articleId)!!}">
            <#if !article??>
            <input type="hidden" name="createUserId" value="${(loginUser.userId)!!}">
            <input type="hidden" name="createUserName" value="${(loginUser.showName)!!}">
            </#if>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">文章标题 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="title" value="${(article.title)!!}" placeholder="请输入文章标题" required>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">摘要 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <textarea class="form-control" name="description" rows="2" placeholder="请输入摘要，250字以内" required>${(article.description)!!}</textarea>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">内容 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <textarea name="content" id="content" class="form-control" rows="15" placeholder="请输入文章内容"><#if article?? && article.content??>${article.content?replace('@@@',request.contextPath+'/file/files/')}</#if></textarea>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">频道分类 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <select class="form-select" name="channelId" id="channelId" required>
                        <option value="">请选择频道</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">关键字</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="keyword" value="${(article.keyword)!!}" placeholder="关键字，逗号分隔">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">是否置顶</label>
                <div class="col-sm-10">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="isTop" id="isTop1" value="1" <#if (article.isTop)?? && article.isTop == 1>checked</#if>>
                        <label class="form-check-label" for="isTop1">是</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="isTop" id="isTop0" value="0" <#if (article.isTop)?? && article.isTop == 0>checked<#elseif !article??>checked</#if>>
                        <label class="form-check-label" for="isTop0">否</label>
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-cms-primary"><i class="bi bi-check-lg me-1"></i>确认保存</button>
                    <button type="button" class="btn btn-outline-secondary ms-2" id="btnUploadNetImg"><i class="bi bi-cloud-download me-1"></i>网络图片转存本地</button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary ms-2">返回</a>
                </div>
            </div>
        </form>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    // 加载频道列表
    $.post('${request.contextPath}/channel/list', {searchParams: '{"parentChannelId":"0"}', page: 1, limit: 99}, function(res) {
        if (res.code === 200 && res.data) {
            var html = '<option value="">请选择频道</option>';
            res.data.forEach(function(ch) {
                var selected = ch.channelId == '${(article.channelId)!"0"}' ? ' selected' : '';
                html += '<option value="' + ch.channelId + '"' + selected + '>' + ch.channelName + '</option>';
            });
            $('#channelId').html(html);
        }
    });

    // 保存
    $('#articleForm').on('submit', function(e) {
        e.preventDefault();
        var formData = {};
        $(this).serializeArray().forEach(function(item) {
            formData[item.name] = item.value;
        });
        // 替换图片路径
        formData.content = formData.content.replaceAll('${request.contextPath}/file/files/', '@@@');

        $.ajax({
            type: 'POST',
            url: '${request.contextPath}/article/save',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            dataType: 'json',
            success: function(res) {
                if (res.code === 200) {
                    CmsUtil.showToast(res.msg || '保存成功', 'success');
                    setTimeout(function() { history.back(); }, 800);
                } else {
                    CmsUtil.showToast(res.msg || '保存失败', 'danger');
                }
            }
        });
    });

    // 网络图片转存
    $('#btnUploadNetImg').on('click', function() {
        var content = $('#content').val();
        var imgRegex = /src="(http[^"]*?)"/g;
        var match;
        var count = 0;
        while ((match = imgRegex.exec(content)) !== null) {
            var imgUrl = match[1];
            if (imgUrl.indexOf('${request.contextPath}') === -1) {
                count++;
                $.post('${request.contextPath}/file/saveNetworkImg', {imgUrl: imgUrl}, function(res) {
                    if (res.data && res.data.src) {
                        var oldSrc = imgUrl;
                        var newContent = $('#content').val().replace(oldSrc, res.data.src);
                        $('#content').val(newContent);
                    }
                });
            }
        }
        if (count === 0) {
            CmsUtil.showToast('未发现需要转存的网络图片', 'info');
        } else {
            CmsUtil.showToast('正在转存 ' + count + ' 张图片...', 'info');
        }
    });
});
</script>
</body>
</html>
