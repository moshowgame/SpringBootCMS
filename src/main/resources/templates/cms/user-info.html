<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-person-badge me-2"></i>个人信息</h6>
    </div>
    <div class="card-body">
        <form id="userInfoForm" class="cms-form">
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">用户名</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" value="${(sessionUser.userName)!!?html}" disabled>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">昵称</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="nickName" value="${(sessionUser.nickName)!!?html}" placeholder="请输入昵称">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">邮箱</label>
                <div class="col-sm-10">
                    <input type="email" class="form-control" name="email" value="${(sessionUser.email)!!?html}" placeholder="请输入邮箱">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">手机号</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="phone" value="${(sessionUser.phone)!!?html}" placeholder="请输入手机号">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-cms-primary"><i class="bi bi-check-lg me-1"></i>保存修改</button>
                </div>
            </div>
        </form>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    $('#userInfoForm').on('submit', function(e) {
        e.preventDefault();
        var formData = {};
        $(this).serializeArray().forEach(function(item) {
            if (item.value) formData[item.name] = item.value;
        });
        $.ajax({
            type: 'POST',
            url: '${request.contextPath}/user/updateInfo',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            dataType: 'json',
            success: function(res) {
                CmsUtil.showToast(res.msg || (res.code === 200 ? '保存成功' : '保存失败'), res.code === 200 ? 'success' : 'danger');
            }
        });
    });
});
</script>
</body>
</html>
