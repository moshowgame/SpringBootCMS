<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-graph-up me-2"></i>数据看板</h6>
    </div>
    <div class="card-body" id="dashboardContent">
        <p class="text-muted">加载中...</p>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    var urlParams = new URLSearchParams(window.location.search);
    var formId = urlParams.get('formId');
    if (formId) {
        $.post('${request.contextPath}/formSubmitValue/dashboard', {formId: formId}, function(res) {
            if (res.code === 200 && res.data) {
                var html = '<div class="row g-3">';
                res.data.forEach(function(item) {
                    html += '<div class="col-md-4"><div class="cms-card p-3">' +
                        '<h6 class="text-muted">' + item.itemName + '</h6>' +
                        '<p class="mb-0 fs-5 fw-bold">' + (item.itemValue || '-') + '</p></div></div>';
                });
                html += '</div>';
                $('#dashboardContent').html(html);
            } else {
                $('#dashboardContent').html('<p class="text-muted">暂无数据</p>');
            }
        });
    }
});
</script>
</body>
</html>
