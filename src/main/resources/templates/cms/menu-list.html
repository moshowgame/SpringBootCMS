<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-menu-button-wide me-2"></i>菜单管理</h6>
        <button class="btn btn-cms-primary btn-sm" id="btnAdd">
            <i class="bi bi-plus-lg me-1"></i>新增菜单
        </button>
    </div>
    <div class="card-body">
        <div class="cms-search">
            <input type="text" class="form-control form-control-sm" id="searchMenuName" placeholder="菜单名称">
            <button class="btn btn-cms-primary btn-sm" id="btnSearch"><i class="bi bi-search me-1"></i>搜索</button>
        </div>

        <div class="table-responsive">
            <table class="cms-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>菜单名称</th>
                        <th>菜单URL</th>
                        <th>图标</th>
                        <th>排序</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody"></tbody>
            </table>
        </div>
        <div id="pagination"></div>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    var table = new CmsTable({
        apiList: '${request.contextPath}/menu/list',
        apiDelete: '${request.contextPath}/menu/delete',
        tableBody: '#dataTableBody',
        paginationEl: '#pagination',
        columns: [
            { field: 'menuId' },
            { field: 'menuName' },
            { field: 'url', render: function(val) { return val || '-'; } },
            { field: 'icon', render: function(val) { return val ? '<i class="bi ' + val + '"></i> ' + val : '-'; } },
            { field: 'sort' },
            { field: 'status', render: function(val) { return val == '1' ? '<span class="badge bg-success badge-status">启用</span>' : '<span class="badge bg-secondary badge-status">停用</span>'; } },
            { field: 'menuId', render: function(val) {
                return '<button class="btn btn-outline-primary btn-sm btn-edit" data-id="'+val+'"><i class="bi bi-pencil"></i>编辑</button> ' +
                       '<button class="btn btn-outline-danger btn-sm btn-delete" data-id="'+val+'"><i class="bi bi-trash"></i>删除</button>';
            }}
        ]
    });

    table.load();

    $('#btnSearch').on('click', function() {
        var name = $('#searchMenuName').val().trim();
        var params = {};
        if (name) params.menuName = name;
        table.search(params);
    });

    $('#btnAdd').on('click', function() {
        window.location.href = '${request.contextPath}/menu/edit?id=0';
    });

    $(document).on('click', '.btn-edit', function() {
        window.location.href = '${request.contextPath}/menu/edit?id=' + $(this).data('id');
    });

    $(document).on('click', '.btn-delete', function() {
        table.delete($(this).data('id'), '菜单');
    });
});
</script>
</body>
</html>
