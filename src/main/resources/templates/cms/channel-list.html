<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-collection me-2"></i>频道管理</h6>
        <button class="btn btn-cms-primary btn-sm" id="btnAdd">
            <i class="bi bi-plus-lg me-1"></i>新增频道
        </button>
    </div>
    <div class="card-body">
        <div class="cms-search">
            <select class="form-select form-select-sm" id="searchParentChannelId" style="max-width:160px;">
                <option value="">全部分类</option>
            </select>
            <input type="text" class="form-control form-control-sm" id="searchChannelName" placeholder="频道名称">
            <button class="btn btn-cms-primary btn-sm" id="btnSearch"><i class="bi bi-search me-1"></i>搜索</button>
        </div>

        <div class="table-responsive">
            <table class="cms-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>频道名称</th>
                        <th>父频道</th>
                        <th>排序</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody"></tbody>
            </table>
        </div>
        <div id="pagination"></div>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    var table = new CmsTable({
        apiList: '${request.contextPath}/channel/list',
        apiDelete: '${request.contextPath}/channel/delete',
        tableBody: '#dataTableBody',
        paginationEl: '#pagination',
        columns: [
            { field: 'channelId' },
            { field: 'channelName' },
            { field: 'parentChannelId', render: function(val) { return val && val != 0 ? val : '顶级'; } },
            { field: 'seq' },
            { field: 'status', render: function(val) { return val == 1 ? '<span class="badge bg-success badge-status">启用</span>' : '<span class="badge bg-secondary badge-status">停用</span>'; } },
            { field: 'channelId', render: function(val, row) {
                var html = '';
                if (row.status == 0) {
                    html += '<button class="btn btn-success btn-sm me-1 btn-publish" data-id="'+val+'" data-status="1"><i class="bi bi-check-lg"></i>启用</button>';
                    html += '<button class="btn btn-outline-danger btn-sm me-1 btn-delete" data-id="'+val+'"><i class="bi bi-trash"></i>删除</button>';
                }
                if (row.status == 1) {
                    html += '<button class="btn btn-outline-warning btn-sm me-1 btn-publish" data-id="'+val+'" data-status="0"><i class="bi bi-pause"></i>停用</button>';
                }
                html += '<button class="btn btn-outline-primary btn-sm btn-edit" data-id="'+val+'"><i class="bi bi-pencil"></i>编辑</button>';
                return html;
            }}
        ]
    });

    table.load();

    $('#btnSearch').on('click', function() {
        var params = {};
        var pid = $('#searchParentChannelId').val();
        var name = $('#searchChannelName').val().trim();
        if (pid) params.parentChannelId = pid;
        if (name) params.channelName = name;
        table.search(params);
    });

    $('#btnAdd').on('click', function() {
        window.location.href = '${request.contextPath}/channel/edit?id=0';
    });

    $(document).on('click', '.btn-edit', function() {
        window.location.href = '${request.contextPath}/channel/edit?id=' + $(this).data('id');
    });

    $(document).on('click', '.btn-delete', function() {
        table.delete($(this).data('id'), '频道');
    });

    $(document).on('click', '.btn-publish', function() {
        var id = $(this).data('id');
        var status = $(this).data('status');
        if (confirm(status == '1' ? '确定启用？' : '确定停用？')) {
            $.post('${request.contextPath}/channel/publish', {id: id, status: status}, function(res) {
                CmsUtil.showToast(res.msg || '操作成功', res.code === 200 ? 'success' : 'danger');
                table.load();
            });
        }
    });

    // 加载父频道
    $.post('${request.contextPath}/channel/list', {searchParams: '{"parentChannelId":"0"}', page: 1, limit: 99}, function(res) {
        if (res.code === 200 && res.data) {
            var html = '<option value="">全部分类</option>';
            res.data.forEach(function(ch) {
                html += '<option value="' + ch.channelId + '">' + ch.channelName + '</option>';
            });
            $('#searchParentChannelId').html(html);
        }
    });
});
</script>
</body>
</html>
