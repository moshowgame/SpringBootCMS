<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-inbox me-2"></i>表单提交管理</h6>
    </div>
    <div class="card-body">
        <input type="hidden" id="formId" value="${(formId)!!}">
        <div class="table-responsive">
            <table class="cms-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>提交人</th>
                        <th>审核状态</th>
                        <th>提交时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody"></tbody>
            </table>
        </div>
        <div id="pagination"></div>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    var formId = $('#formId').val();
    var table = new CmsTable({
        apiList: '${request.contextPath}/formSubmit/list',
        apiDelete: '${request.contextPath}/formSubmit/delete',
        tableBody: '#dataTableBody',
        paginationEl: '#pagination',
        columns: [
            { field: 'submitId' },
            { field: 'showName', render: function(val) { return val || '-'; } },
            { field: 'status', render: function(val) {
                if (val == 1) return '<span class="badge bg-success badge-status">已审核</span>';
                if (val == 2) return '<span class="badge bg-danger badge-status">已拒绝</span>';
                return '<span class="badge bg-warning badge-status">待审核</span>';
            }},
            { field: 'createTime' },
            { field: 'submitId', render: function(val, row) {
                return '<a href="${request.contextPath}/formSubmitValue/display?formId='+row.formId+'&submitId='+val+'" class="btn btn-outline-info btn-sm me-1"><i class="bi bi-eye"></i>查看</a>' +
                       '<button class="btn btn-outline-success btn-sm me-1 btn-audit" data-id="'+val+'" data-status="1"><i class="bi bi-check-lg"></i>通过</button>' +
                       '<button class="btn btn-outline-danger btn-sm btn-audit" data-id="'+val+'" data-status="2"><i class="bi bi-x-lg"></i>拒绝</button>';
            }}
        ]
    });

    table.searchParams = { searchParams: JSON.stringify({formId: formId}) };
    table.load();

    $(document).on('click', '.btn-audit', function() {
        var id = $(this).data('id');
        var status = $(this).data('status');
        $.post('${request.contextPath}/formSubmit/audit', {id: id, auditStatus: status}, function(res) {
            CmsUtil.showToast(res.msg || '操作成功', res.code === 200 ? 'success' : 'danger');
            table.load();
        });
    });
});
</script>
</body>
</html>
