<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-ui-checks-grid me-2"></i>表单管理</h6>
        <button class="btn btn-cms-primary btn-sm" id="btnAdd">
            <i class="bi bi-plus-lg me-1"></i>新增表单
        </button>
    </div>
    <div class="card-body">
        <div class="cms-search">
            <input type="text" class="form-control form-control-sm" id="searchTitle" placeholder="表单名称">
            <button class="btn btn-cms-primary btn-sm" id="btnSearch"><i class="bi bi-search me-1"></i>搜索</button>
        </div>

        <div class="table-responsive">
            <table class="cms-table">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>ID</th>
                        <th>表单名称</th>
                        <th>描述</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody"></tbody>
            </table>
        </div>
        <div id="pagination"></div>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    var table = new CmsTable({
        apiList: '${request.contextPath}/form/list',
        apiDelete: '${request.contextPath}/form/delete',
        tableBody: '#dataTableBody',
        paginationEl: '#pagination',
        columns: [
            { field: 'formId' },
            { field: 'formName' },
            { field: 'formDesc', render: function(val) { return val || '-'; } },
            { field: 'status', render: function(val) { return val == 1 ? '<span class="badge bg-success badge-status">启用</span>' : '<span class="badge bg-secondary badge-status">停用</span>'; } },
            { field: 'formId', render: function(val, row) {
                return '<button class="btn btn-outline-primary btn-sm me-1 btn-edit" data-id="'+val+'"><i class="bi bi-pencil"></i>编辑</button>' +
                       '<button class="btn btn-outline-danger btn-sm me-1 btn-delete" data-id="'+val+'"><i class="bi bi-trash"></i>删除</button>' +
                       '<a href="${request.contextPath}/formItem/list?formId='+val+'" class="btn btn-outline-info btn-sm me-1"><i class="bi bi-list-check"></i>字段</a>' +
                       '<a href="${request.contextPath}/formSubmit/list?formId='+val+'" class="btn btn-outline-success btn-sm me-1"><i class="bi bi-inbox"></i>提交</a>';
            }}
        ]
    });

    table.load();

    $('#btnSearch').on('click', function() {
        var title = $('#searchTitle').val().trim();
        var params = {};
        if (title) params.title = title;
        table.search(params);
    });

    $('#btnAdd').on('click', function() {
        window.location.href = '${request.contextPath}/form/edit?id=0';
    });

    $(document).on('click', '.btn-edit', function() {
        window.location.href = '${request.contextPath}/form/edit?id=' + $(this).data('id');
    });

    $(document).on('click', '.btn-delete', function() {
        table.delete($(this).data('id'), '表单');
    });
});
</script>
</body>
</html>
