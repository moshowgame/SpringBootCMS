<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-calendar-event me-2"></i><#if activity??>编辑活动<#else>新增活动</#if></h6>
    </div>
    <div class="card-body">
        <form id="activityForm" class="cms-form">
            <input type="hidden" name="activityId" value="${(activity.activityId)!!?html}">

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">活动名称 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="activityName" value="${(activity.activityName)!!?html}" placeholder="请输入活动名称" required>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">活动描述</label>
                <div class="col-sm-10">
                    <textarea class="form-control" name="activityDesc" rows="3" placeholder="请输入活动描述">${(activity.activityDesc)!!?html}</textarea>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">开始时间</label>
                <div class="col-sm-10">
                    <input type="datetime-local" class="form-control" name="startTime" value="<#if activity?? && activity.startTime??>${activity.startTime?datetime?string("yyyy-MM-dd'T'HH:mm")}</#if>">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">结束时间</label>
                <div class="col-sm-10">
                    <input type="datetime-local" class="form-control" name="endTime" value="<#if activity?? && activity.endTime??>${activity.endTime?datetime?string("yyyy-MM-dd'T'HH:mm")}</#if>">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">状态</label>
                <div class="col-sm-10">
                    <select class="form-select" name="status">
                        <option value="0" <#if (activity.status)?? && activity.status == 0>selected</#if>>未开始</option>
                        <option value="1" <#if (activity.status)?? && activity.status == 1>selected</#if>>进行中</option>
                        <option value="2" <#if (activity.status)?? && activity.status == 2>selected</#if>>已结束</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-cms-primary"><i class="bi bi-check-lg me-1"></i>确认保存</button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary ms-2">返回</a>
                </div>
            </div>
        </form>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    $('#activityForm').on('submit', function(e) {
        e.preventDefault();
        var formData = {};
        $(this).serializeArray().forEach(function(item) {
            formData[item.name] = item.value;
        });
        $.ajax({
            type: 'POST',
            url: '${request.contextPath}/activity/save',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            dataType: 'json',
            success: function(res) {
                if (res.code === 200) {
                    CmsUtil.showToast(res.msg || '保存成功', 'success');
                    setTimeout(function() { history.back(); }, 800);
                } else {
                    CmsUtil.showToast(res.msg || '保存失败', 'danger');
                }
            }
        });
    });
});
</script>
</body>
</html>
