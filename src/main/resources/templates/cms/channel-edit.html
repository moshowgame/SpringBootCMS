<!DOCTYPE html>
<html lang="zh-CN">
<#import "common/common-import.html" as netCommon>
<@netCommon.commonImport />
<body class="p-3">

<div class="cms-card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-collection me-2"></i><#if channel??>编辑频道<#else>新增频道</#if></h6>
    </div>
    <div class="card-body">
        <form id="channelForm" class="cms-form">
            <input type="hidden" name="channelId" value="${(channel.channelId)!!?html}">

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">频道名称 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="channelName" value="${(channel.channelName)!!?html}" placeholder="请输入频道名称" required>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">父频道</label>
                <div class="col-sm-10">
                    <select class="form-select" name="parentChannelId" id="parentChannelId">
                        <option value="0">顶级频道</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">排序</label>
                <div class="col-sm-10">
                    <input type="number" class="form-control" name="seq" value="${(channel.seq)!'0'?html}" placeholder="排序值">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-cms-primary"><i class="bi bi-check-lg me-1"></i>确认保存</button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary ms-2">返回</a>
                </div>
            </div>
        </form>
    </div>
</div>

<@netCommon.commonScript />
<script>
$(function() {
    // 加载父频道
    $.post('${request.contextPath}/channel/list', {searchParams: '{"parentChannelId":"0"}', page: 1, limit: 99}, function(res) {
        if (res.code === 200 && res.data) {
            var html = '<option value="0">顶级频道</option>';
            res.data.forEach(function(ch) {
                var selected = ch.channelId == '${(channel.parentChannelId)!"0"}' ? ' selected' : '';
                // XSS 防护：channelName 来自数据库
                html += '<option value="' + CmsUtil.escapeHtml(ch.channelId) + '"' + selected + '>' + CmsUtil.escapeHtml(ch.channelName) + '</option>';
            });
            $('#parentChannelId').html(html);
        }
    });

    $('#channelForm').on('submit', function(e) {
        e.preventDefault();
        var formData = {};
        $(this).serializeArray().forEach(function(item) {
            formData[item.name] = item.value;
        });
        $.ajax({
            type: 'POST',
            url: '${request.contextPath}/channel/save',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            dataType: 'json',
            success: function(res) {
                if (res.code === 200) {
                    CmsUtil.showToast(res.msg || '保存成功', 'success');
                    setTimeout(function() { history.back(); }, 800);
                } else {
                    CmsUtil.showToast(res.msg || '保存失败', 'danger');
                }
            }
        });
    });
});
</script>
</body>
</html>
