<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SpringBootCMS - 登录</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="${request.contextPath}/static/css/admin.css">
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-title">
            <h1><i class="bi bi-gear-wide-connected me-2"></i>SpringBootCMS</h1>
            <p>内容管理系统</p>
        </div>
        <form id="loginForm" autocomplete="off">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" value="admin" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" value="123456" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">验证码</label>
                <div class="captcha-row">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
                        <input type="text" class="form-control" id="captcha" name="captcha" placeholder="请输入验证码" required>
                    </div>
                    <img id="captchaPic" src="${request.contextPath}/admin/captcha" alt="验证码" title="点击刷新">
                </div>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe" name="rememberMe">
                <label class="form-check-label" for="rememberMe">记住密码</label>
            </div>
            <button type="submit" class="btn btn-cms-primary w-100 py-2">
                <i class="bi bi-box-arrow-in-right me-1"></i>登 录
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 跳出iframe
    if (top.location !== self.location) top.location = self.location;

    $(function() {
        // 点击刷新验证码
        $('#captchaPic').on('click', function() {
            $(this).attr('src', '${request.contextPath}/admin/captcha?t=' + new Date().getTime());
        });

        // 登录表单提交
        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            var username = $('#username').val().trim();
            var password = $('#password').val().trim();
            var captcha = $('#captcha').val().trim();

            if (!username) { CmsUtil.showToast('用户名不能为空', 'warning'); return; }
            if (!password) { CmsUtil.showToast('密码不能为空', 'warning'); return; }
            if (!captcha) { CmsUtil.showToast('验证码不能为空', 'warning'); return; }

            $.ajax({
                type: 'POST',
                url: '${request.contextPath}/admin/login',
                data: { userName: username, password: password, captcha: captcha },
                dataType: 'json',
                success: function(res) {
                    if (res.code === 200) {
                        CmsUtil.showToast('登录成功', 'success');
                        setTimeout(function() {
                            window.location.href = '${request.contextPath}/admin/index';
                        }, 500);
                    } else {
                        CmsUtil.showToast(res.msg || '登录失败', 'danger');
                        $('#captchaPic').attr('src', '${request.contextPath}/admin/captcha?t=' + new Date().getTime());
                        $('#captcha').val('');
                    }
                },
                error: function() {
                    CmsUtil.showToast('网络错误，请重试', 'danger');
                }
            });
        });
    });
</script>
</body>
</html>
