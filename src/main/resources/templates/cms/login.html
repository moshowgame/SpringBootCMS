<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SpringBootCMS - 登录</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="${request.contextPath}/static/lib/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="${request.contextPath}/static/lib/bootstrap-icons/css/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="${request.contextPath}/static/css/admin.css">
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-title">
            <h1><i class="bi bi-gear-wide-connected me-2"></i>SpringBootCMS</h1>
            <p>内容管理系统</p>
        </div>
        <form id="loginForm" autocomplete="off">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">验证码</label>
                <div class="d-flex gap-2 align-items-center">
                    <div class="input-group flex-grow-1">
                        <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
                        <input type="text" class="form-control" id="captcha" name="captcha" placeholder="请输入验证码" required maxlength="4">
                    </div>
                    <img id="captchaPic" src="${request.contextPath}/admin/captcha" alt="验证码" title="点击刷新验证码"
                         class="captcha-img border rounded" style="cursor:pointer;height:48px;width:130px;object-fit:cover;">
                </div>
                <small class="text-muted d-block mt-1"><i class="bi bi-info-circle"></i> 点击图片可刷新验证码</small>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe" name="rememberMe">
                <label class="form-check-label" for="rememberMe">记住密码</label>
            </div>
            <button type="submit" class="btn btn-cms-primary w-100 py-2">
                <i class="bi bi-box-arrow-in-right me-1"></i>登 录
            </button>
        </form>
    </div>
</div>

<!-- Toast 容器 -->
<div id="toastContainer" class="toast-container position-fixed top-3 end-3 p-3" style="z-index:9999;">
</div>

<script src="${request.contextPath}/static/lib/jquery/jquery.min.js"></script>
<script src="${request.contextPath}/static/lib/bootstrap/js/bootstrap.bundle.min.js"></script>
<script>
    if (top.location !== self.location) top.location = self.location;

    var contextPath = '${request.contextPath}';

    function showToast(msg, type) {
        var bgClass = type === 'success' ? 'bg-success' : (type === 'danger' ? 'bg-danger' : 'bg-warning text-dark');
        var toastHtml = '<div class="toast align-items-center text-white border-0 ' + bgClass + ' show" role="alert">' +
            '<div class="d-flex"><div class="toast-body">' + msg + '</div>' +
            '<button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>' +
            '</div></div>';
        $('#toastContainer').html(toastHtml);
        var toastEl = $('#toastContainer .toast')[0];
        bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 2500 }).show();
    }

    function refreshCaptcha() {
        $('#captchaPic').css('opacity', '0.4');
        $('#captchaPic').attr('src', contextPath + '/admin/captcha?t=' + new Date().getTime());
        setTimeout(function() {
            $('#captchaPic').css('opacity', '1');
        }, 300);
    }

    $(function() {
        $('#captchaPic').on('click', function() {
            refreshCaptcha();
            $('#captcha').val('').focus();
        });

        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            var username = $('#username').val().trim();
            var password = $('#password').val().trim();
            var captcha = $('#captcha').val().trim();

            if (!username) { showToast('用户名不能为空', 'warning'); return; }
            if (!password) { showToast('密码不能为空', 'warning'); return; }
            if (!captcha) { showToast('验证码不能为空', 'warning'); return; }

            $.ajax({
                type: 'POST',
                url: contextPath + '/admin/login',
                data: { userName: username, password: password, captcha: captcha },
                dataType: 'json',
                success: function(res) {
                    if (res.code === 200) {
                        showToast('登录成功', 'success');
                        setTimeout(function() {
                            window.location.href = contextPath + '/admin/index';
                        }, 500);
                    } else {
                        showToast(res.msg || '登录失败', 'danger');
                        refreshCaptcha();
                        $('#captcha').val('');
                    }
                },
                error: function() {
                    showToast('网络错误，请重试', 'danger');
                }
            });
        });
    });
</script>
</body>
</html>
