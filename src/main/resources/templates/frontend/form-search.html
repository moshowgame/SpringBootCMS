<!DOCTYPE html>
<html lang="zh-CN">
<#import "common-import.html" as ft>
<@ft.frontendHead />
<body>
<@ft.frontendHeader />

<!-- Page Header -->
<section class="page-header">
    <div class="container">
        <div class="row justify-content-center align-items-center">
            <div class="col-md-6">
                <input id="searchParam" class="form-control form-control-lg" placeholder="搜索表单">
            </div>
            <div class="col-md-2 mt-2 mt-md-0">
                <button class="btn btn-light btn-lg w-100" onclick="resetAndSearch()"><i class="bi bi-search me-2"></i>搜索</button>
            </div>
        </div>
    </div>
</section>

<!-- Form List -->
<section class="section-padding">
    <div class="container">
        <div id="articleListDiv"></div>
        <nav aria-label="表单分页">
            <ul class="pagination justify-content-center" id="pageAreaDiv"></ul>
        </nav>
    </div>
</section>

<@ft.frontendFooter />
<@ft.frontendScript />
<script>
var ctxPath = '${request.contextPath}';
var currentPage = 1, init = 0, totalPages = 1, limit = 10;

function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return String(dateStr).substring(0, 10);
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    } catch(e) { return String(dateStr).substring(0, 10); }
}

function insertForm(id, title, tab, date, description) {
    var desc = description || '';
    if (desc.length > 120) desc = desc.substring(0, 120) + '...';
    return '<div class="article-card"><h3><a href="' + ctxPath + '/page/formSubmit/' + id + '">' + title + '</a></h3>' +
        '<div class="meta"><i class="bi bi-person me-1"></i>' + (tab || '系统') +
        '<span class="mx-2">|</span><i class="bi bi-clock me-1"></i>' + formatDate(date) + '</div>' +
        '<p class="text-muted mb-0"><a href="' + ctxPath + '/page/formSubmit/' + id + '" class="text-decoration-none text-muted">' + (desc || '点击填写表单') + '</a></p></div>';
}

function switchPage(index) {
    if (index < 1 || index > totalPages) return;
    $('#p' + currentPage).removeClass('active');
    currentPage = index;
    $('#p' + currentPage).addClass('active');
    getFormList();
}

function resetAndSearch() {
    init = 0;
    currentPage = 1;
    getFormList();
}

function getFormList() {
    $.ajax({
        type: 'POST',
        url: ctxPath + '/page/form/list',
        data: JSON.stringify({"searchParam": $("#searchParam").val(), "page": currentPage, "limit": limit}),
        dataType: 'json',
        contentType: 'application/json',
        success: function(res) {
            $('#articleListDiv').html('');
            var data = res.data || [], count = res.count || 0;
            if (count > limit && init === 0) {
                totalPages = Math.ceil(count / limit);
                $('#pageAreaDiv').html('');
                $('#pageAreaDiv').append('<li class="page-item"><a class="page-link" href="javascript:switchPage(currentPage-1)">&laquo;</a></li>');
                for (var i = 1; i <= totalPages; i++) {
                    $('#pageAreaDiv').append('<li class="page-item" id="p' + i + '"><a class="page-link" href="javascript:switchPage(' + i + ')">' + i + '</a></li>');
                }
                $('#pageAreaDiv').append('<li class="page-item"><a class="page-link" href="javascript:switchPage(currentPage+1)">&raquo;</a></li>');
                currentPage = 1;
                init = 1;
                $('#p1').addClass('active');
            }
            if (!data || data.length < 1) {
                $('#articleListDiv').html('<div class="text-center py-5"><i class="bi bi-file-earmark-text text-muted" style="font-size:3rem;"></i><p class="text-muted mt-3">目前没有任何表单</p></div>');
                return;
            }
            for (var n in data) {
                $('#articleListDiv').append(insertForm(
                    data[n].formId,
                    data[n].formName,
                    data[n].createUserName,
                    data[n].createTime,
                    data[n].formDesc
                ));
            }
        }
    });
}
getFormList();
</script>
</body>
</html>
