<!DOCTYPE html>
<html lang="zh-CN">
<#import "common-import.html" as ft>
<@ft.frontendHead />
<body>
<@ft.frontendHeader />

<!-- Page Header -->
<section class="page-header">
    <div class="container">
        <div class="row justify-content-center align-items-center">
            <div class="col-md-6">
                <input id="searchParam" class="form-control form-control-lg" placeholder="搜索表单">
            </div>
            <div class="col-md-2 mt-2 mt-md-0">
                <button class="btn btn-light btn-lg w-100" onclick="getFormList()">搜索</button>
            </div>
        </div>
    </div>
</section>

<!-- Form List -->
<section class="section-padding">
    <div class="container">
        <div id="articleListDiv"></div>
        <nav aria-label="表单分页">
            <ul class="pagination justify-content-center" id="pageAreaDiv"></ul>
        </nav>
    </div>
</section>

<@ft.frontendFooter />
<@ft.frontendScript />
<script>
var currentPage = 1, init = 0, totalPages = 1, limit = 10;

function insertForm(id, title, tab, date, description) {
    return '<div class="article-card"><h3><a href="${request.contextPath}/page/formSubmit/' + id + '">' + title + '</a></h3>' +
        '<div class="meta"><span class="me-3">' + tab + '</span><span>' + date + '</span></div>' +
        '<p class="text-muted mb-0"><a href="${request.contextPath}/page/activitySign/' + id + '" class="text-decoration-none text-muted">' + description + '</a></p></div>';
}

function switchPage(index) {
    if (index < 1 || index > totalPages) return;
    $('#p' + currentPage).removeClass('active');
    $('#p' + index).addClass('active');
    currentPage = index;
    getFormList();
}

function getFormList() {
    $.ajax({
        type: 'POST',
        url: '${request.contextPath}/page/form/list',
        data: JSON.stringify({"searchParam": $("#searchParam").val(), "page": currentPage, "limit": limit}),
        dataType: 'json',
        contentType: 'application/json',
        success: function(res) {
            $('#articleListDiv').html('');
            var data = res.data, count = res.count;
            if (count > limit && init === 0) {
                totalPages = Math.ceil(count / limit);
                $('#pageAreaDiv').html('');
                $('#pageAreaDiv').append('<li class="page-item"><a class="page-link" onclick="switchPage(currentPage-1)">&laquo;</a></li>');
                for (var i = 1; i <= totalPages; i++) {
                    $('#pageAreaDiv').append('<li class="page-item" id="p' + i + '"><a class="page-link" onclick="switchPage(' + i + ')">' + i + '</a></li>');
                }
                $('#pageAreaDiv').append('<li class="page-item"><a class="page-link" onclick="switchPage(currentPage+1)">&raquo;</a></li>');
                currentPage = 1;
                init = 1;
                $('#p1').addClass('active');
            }
            if (!data || data.length < 1) {
                $('#articleListDiv').html('<p class="text-muted text-center">目前没有任何表单</p>');
                return;
            }
            for (var n in data) {
                $('#articleListDiv').append(insertForm(data[n].formId, data[n].formName, data[n].createUserName, data[n].createTime, data[n].formDesc));
            }
        }
    });
}
getFormList();
</script>
</body>
</html>
