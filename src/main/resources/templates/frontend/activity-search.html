<!DOCTYPE html>
<html lang="zh-CN">
<#import "common-import.html" as ft>
<@ft.frontendHead title="活动签到 - ${(templateMap.companyName)!'SpringBootCMS'}" description="浏览并参与活动签到" />
<body>
<@ft.frontendHeader />

<!-- Page Header -->
<section class="page-header">
    <div class="container">
        <div class="row justify-content-center align-items-center">
            <div class="col-md-6">
                <input id="searchParam" class="form-control form-control-lg" placeholder="搜索活动">
            </div>
            <div class="col-md-2 mt-2 mt-md-0">
                <button class="btn btn-light btn-lg w-100" onclick="resetAndSearch()"><i class="bi bi-search me-2"></i>搜索</button>
            </div>
        </div>
    </div>
</section>

<!-- Activity List -->
<section class="section-padding">
    <div class="container">
        <div id="articleListDiv"></div>
        <nav aria-label="活动分页">
            <ul class="pagination justify-content-center" id="pageAreaDiv"></ul>
        </nav>
    </div>
</section>

<@ft.frontendFooter />
<@ft.frontendScript />
<script>
var ctxPath = '${request.contextPath}';
var currentPage = 1, init = 0, totalPages = 1, limit = 10;

function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return String(dateStr).substring(0, 10);
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    } catch(e) { return String(dateStr).substring(0, 10); }
}

function insertActivity(id, title, tab, sdate, edate, description) {
    var desc = description || '';
    if (desc.length > 120) desc = desc.substring(0, 120) + '...';
    return '<div class="article-card"><h3><a href="' + ctxPath + '/page/activitySign/' + id + '">' + title + '</a></h3>' +
        '<div class="meta"><i class="bi bi-person me-1"></i>' + (tab || '系统') +
        '<span class="mx-2">|</span><i class="bi bi-calendar3 me-1"></i>' + formatDate(sdate) + ' 至 ' + formatDate(edate) + '</div>' +
        '<p class="text-muted mb-0"><a href="' + ctxPath + '/page/activitySign/' + id + '" class="text-decoration-none text-muted">' + (desc || '点击查看活动详情') + '</a></p></div>';
}

function switchPage(index) {
    if (index < 1 || index > totalPages) return;
    $('#p' + currentPage).removeClass('active');
    currentPage = index;
    $('#p' + currentPage).addClass('active');
    getActivityList();
}

function resetAndSearch() {
    init = 0;
    currentPage = 1;
    getActivityList();
}

function getActivityList() {
    $('#articleListDiv').html('<div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div><p class="text-muted mt-2">加载中...</p></div>');
    var kw = $('#searchParam').val();
    // 客户端预检测攻击特征
    var localCheck = localAttackCheck(kw);
    if (localCheck.detected) {
        $('#articleListDiv').html(
            '<div class="alert alert-danger" role="alert">' +
            '<i class="bi bi-shield-exclamation me-2"></i>' +
            '<strong>输入已被拦截：</strong>检测到 <code>' + localCheck.typeDescription + '</code> 攻击特征 ' +
            '（关键字：<code>' + localCheck.keyword + '</code>）' +
            '<hr><p class="mb-0 small">请输入正常的搜索关键词。如持续出现此提示，请联系管理员。</p>' +
            '</div>'
        );
        return;
    }
    $.ajax({
        type: 'POST',
        url: ctxPath + '/page/activity/list',
        data: JSON.stringify({"searchParam": kw, "page": currentPage, "limit": limit}),
        dataType: 'json',
        contentType: 'application/json',
        success: function(res) {
            $('#articleListDiv').html('');
            if (res.code !== 200 && res.msg && res.msg.indexOf('攻击已拦截') !== -1) {
                $('#articleListDiv').html(
                    '<div class="alert alert-danger" role="alert">' +
                    '<i class="bi bi-shield-exclamation me-2"></i>' +
                    '<strong>输入已被服务端拦截：</strong>' + res.msg +
                    '<hr><p class="mb-0 small">您的输入包含可疑字符，已被系统安全策略拒绝。如确认输入无误，请联系管理员。</p>' +
                    '</div>'
                );
                return;
            }
            var data = res.data || [], count = res.count || 0;
            if (count > limit && init === 0) {
                totalPages = Math.ceil(count / limit);
                $('#pageAreaDiv').html('');
                $('#pageAreaDiv').append('<li class="page-item"><a class="page-link" href="javascript:switchPage(currentPage-1)">&laquo;</a></li>');
                for (var i = 1; i <= totalPages; i++) {
                    $('#pageAreaDiv').append('<li class="page-item" id="p' + i + '"><a class="page-link" href="javascript:switchPage(' + i + ')">' + i + '</a></li>');
                }
                $('#pageAreaDiv').append('<li class="page-item"><a class="page-link" href="javascript:switchPage(currentPage+1)">&raquo;</a></li>');
                currentPage = 1;
                init = 1;
                $('#p1').addClass('active');
            }
            if (!data || data.length < 1) {
                $('#articleListDiv').html('<div class="text-center py-5"><i class="bi bi-calendar-event text-muted" style="font-size:3rem;"></i><p class="text-muted mt-3">没有找到相关活动</p></div>');
                return;
            }
            for (var n in data) {
                $('#articleListDiv').append(insertActivity(
                    data[n].activityId,
                    data[n].activityName,
                    data[n].createUserName,
                    data[n].startTime,
                    data[n].endTime,
                    data[n].activityDesc
                ));
            }
        },
        error: function() {
            $('#articleListDiv').html('<div class="text-center py-5"><i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem;"></i><p class="text-muted mt-3">加载失败，请稍后重试</p></div>');
        }
    });
}

/**
 * 客户端轻量级攻击检测（与服务端 AttackDetectionUtil 对齐）
 * <p>仅用于即时 UX 反馈，真正的安全拦截依靠服务端校验。
 */
var ATTACK_RULES = [
    { type: 'SQL_INJECTION', typeDescription: 'SQL 注入', pattern: /(\bunion\b[\s\/*]+select\b|\bor\s+1\s*=\s*1|--|\/\*)/i, keyword: 'SQL 关键字' },
    { type: 'XSS', typeDescription: 'XSS 跨站脚本', pattern: /(<\s*script\b|<\s*iframe\b|javascript\s*:|on(error|load|click)\s*=)/i, keyword: 'XSS 标签/事件' },
    { type: 'SVG_INJECTION', typeDescription: 'SVG 注入', pattern: /(<\s*svg\b|<\s*use\b|xlink\s*:\s*href)/i, keyword: 'SVG 标签' },
    { type: 'COMMAND_INJECTION', typeDescription: '命令注入', pattern: /[;`|&]/, keyword: '命令链式符号' },
    { type: 'PATH_TRAVERSAL', typeDescription: '路径遍历', pattern: /(\.\.\/|\.\.\\)/, keyword: '../ 路径遍历' },
    { type: 'SSRF', typeDescription: '服务端请求伪造', pattern: /(file|gopher|dict):\/\//i, keyword: '危险协议' }
];

function localAttackCheck(value) {
    if (!value) return { detected: false };
    for (var i = 0; i < ATTACK_RULES.length; i++) {
        var rule = ATTACK_RULES[i];
        if (rule.pattern.test(value)) {
            return { detected: true, type: rule.type, typeDescription: rule.typeDescription, keyword: rule.keyword };
        }
    }
    return { detected: false };
}
getActivityList();
</script>
</body>
</html>
